name: Activity Tracker

on:
  # PRIMARY cadence = the self-dispatching repository_dispatch chain (see the
  # "Keep the 5-minute chain alive" step at the bottom). GitHub's */5 cron is
  # heavily throttled for this repo and fires only sporadically, so it cannot
  # be relied on as the scheduler — it's a sparse fallback that only revives
  # the chain if it ever dies.
  #
  # The chain used to FORK: any extra trigger (a stray cron fire, a manual run,
  # a /restart) made a run that ALSO scheduled its own next run, so two parallel
  # chains would run ~5min apart forever. Those parallel chains read stale state
  # cache and each posted "Tracker Was Down", which was the alert spam. The
  # anti-fork guard in the dispatch step now collapses parallel chains back to
  # a single chain.
  schedule:
    - cron: '*/30 * * * *'         # sparse fallback only — revives a dead chain
  workflow_dispatch:               # manual trigger / bootstrap
  repository_dispatch:
    types: [run-tracker]           # the self-sustaining chain + /restart + cookie update

concurrency:
  group: tracker
  cancel-in-progress: false        # queue instead of cancel; prevents double-posts

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write              # lets github.token fire repository_dispatch (/restart)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv pynacl

      # Restore .state.json and epic_auth.json from the previous run
      - name: Restore cached runtime files
        uses: actions/cache/restore@v4
        with:
          path: |
            .state.json
            epic_auth.json
          key: tracker-runtime-${{ github.run_number }}
          restore-keys: |
            tracker-runtime-

      # Write epic_auth.json from secret only if cache didn't restore it
      - name: Write Epic auth from secret (first run only)
        run: |
          if [ ! -f epic_auth.json ]; then
            echo "$EPIC_AUTH_JSON" > epic_auth.json
          fi
        env:
          EPIC_AUTH_JSON: ${{ secrets.EPIC_AUTH_JSON }}

      - name: Run tracker check
        id: tracker
        env:
          ROBLOX_COOKIE: ${{ secrets.ROBLOX_COOKIE }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          EPIC_AUTH_JSON: ${{ secrets.EPIC_AUTH_JSON }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          GH_TOKEN: ${{ github.token }}
        run: python run_once.py

      # Report any Python crash to Discord
      - name: Notify Discord on tracker failure
        if: failure() && steps.tracker.outcome == 'failure'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          python - <<'EOF'
          import os, requests, datetime
          from zoneinfo import ZoneInfo
          token = os.environ.get("DISCORD_BOT_TOKEN", "")
          if not token:
              exit()
          ts = datetime.datetime.now(ZoneInfo("America/New_York")).strftime("%m/%d/%Y %I:%M %p %Z")
          requests.post(
              "https://discord.com/api/v10/channels/1510142665453207715/messages",
              headers={"Authorization": f"Bot {token}", "Content-Type": "application/json"},
              json={"embeds": [{"title": "Tracker Crashed", "description": "run_once.py exited with an error. Check GitHub Actions logs.", "color": 0xFF0000, "footer": {"text": ts}}]},
              timeout=10,
          )
          EOF

      # Save updated state and refreshed Epic token for the next run
      - name: Save runtime files to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            .state.json
            epic_auth.json
          key: tracker-runtime-${{ github.run_number }}

      # Self-trigger the next run in ~5 minutes. This chain is the real
      # scheduler (the */5 cron is throttled to nothing for this repo).
      - name: Keep the 5-minute chain alive
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 290
          # Anti-fork guard: only fire the next run if THIS job is the only
          # tracker run currently active. If another run is already queued or in
          # progress, a parallel chain exists — stop this one and let that one
          # carry on, so any accidental forks collapse back to a single chain.
          # (This job itself counts as one in_progress run, hence "-le 1".)
          active=$(gh run list --repo "${{ github.repository }}" --workflow tracker.yml \
                     --json status \
                     --jq '[.[] | select(.status=="queued" or .status=="in_progress")] | length' \
                     2>/dev/null || echo 1)
          if [ "${active:-1}" -le 1 ]; then
            echo "Sole active run — dispatching next run."
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d '{"event_type":"run-tracker"}'
          else
            echo "Anti-fork: $active runs active — not dispatching (a parallel chain continues)."
          fi
