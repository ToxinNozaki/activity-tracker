name: Activity Tracker

on:
  # The cron is the SOLE scheduler. It runs every 5 minutes, and the
  # concurrency group below serializes runs so they never overlap or race on
  # the state cache.
  #
  # The old setup also ran a self-dispatching repository_dispatch chain
  # (sleep 290 -> fire the next run). That chain could FORK: any time two runs
  # executed close together (cron colliding with the chain, or a manual run),
  # each one scheduled its own "next run", permanently doubling the cadence.
  # The resulting stacked, back-to-back runs restored stale state cache before
  # the previous run's save had propagated, producing the false
  # "Tracker Was Down" pings. Cron-only removes the forking entirely.
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:               # manual trigger
  repository_dispatch:
    # On-demand immediate runs only — fired by the /restart command and by the
    # cookie updater after a new cookie is saved. This is NOT a recurring chain
    # (the auto self-dispatch that used to fork was removed), so it can't stack.
    types: [run-tracker]

concurrency:
  group: tracker
  cancel-in-progress: false        # queue instead of cancel; prevents double-posts

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write              # lets github.token fire repository_dispatch (/restart)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv pynacl

      # Restore .state.json and epic_auth.json from the previous run
      - name: Restore cached runtime files
        uses: actions/cache/restore@v4
        with:
          path: |
            .state.json
            epic_auth.json
          key: tracker-runtime-${{ github.run_number }}
          restore-keys: |
            tracker-runtime-

      # Write epic_auth.json from secret only if cache didn't restore it
      - name: Write Epic auth from secret (first run only)
        run: |
          if [ ! -f epic_auth.json ]; then
            echo "$EPIC_AUTH_JSON" > epic_auth.json
          fi
        env:
          EPIC_AUTH_JSON: ${{ secrets.EPIC_AUTH_JSON }}

      - name: Run tracker check
        id: tracker
        env:
          ROBLOX_COOKIE: ${{ secrets.ROBLOX_COOKIE }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          EPIC_AUTH_JSON: ${{ secrets.EPIC_AUTH_JSON }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          GH_TOKEN: ${{ github.token }}
        run: python run_once.py

      # Report any Python crash to Discord
      - name: Notify Discord on tracker failure
        if: failure() && steps.tracker.outcome == 'failure'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          python - <<'EOF'
          import os, requests, datetime
          from zoneinfo import ZoneInfo
          token = os.environ.get("DISCORD_BOT_TOKEN", "")
          if not token:
              exit()
          ts = datetime.datetime.now(ZoneInfo("America/New_York")).strftime("%m/%d/%Y %I:%M %p %Z")
          requests.post(
              "https://discord.com/api/v10/channels/1510142665453207715/messages",
              headers={"Authorization": f"Bot {token}", "Content-Type": "application/json"},
              json={"embeds": [{"title": "Tracker Crashed", "description": "run_once.py exited with an error. Check GitHub Actions logs.", "color": 0xFF0000, "footer": {"text": ts}}]},
              timeout=10,
          )
          EOF

      # Save updated state and refreshed Epic token for the next run
      - name: Save runtime files to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            .state.json
            epic_auth.json
          key: tracker-runtime-${{ github.run_number }}
