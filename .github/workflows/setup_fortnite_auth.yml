name: Setup Fortnite Device Auth (run once)

on:
  workflow_dispatch:   # trigger manually — run this ONE time to generate EPIC_DEVICE_AUTH

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fortnitepy requests pytz

      - name: Generate and save EPIC_DEVICE_AUTH secret
        env:
          EPIC_AUTH_JSON: ${{ secrets.EPIC_AUTH_JSON }}
          GITHUB_PAT:     ${{ secrets.GITHUB_PAT }}
        run: python setup_fortnite_actions.py
